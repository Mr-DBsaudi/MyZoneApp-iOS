name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate app icons from logo_app.png
        run: |
          pip install Pillow -q
          python - <<'EOF'
          from PIL import Image
          import os, json

          out_dir = "Resources/Assets.xcassets/AppIcon.appiconset"
          logo_dir = "Resources/Assets.xcassets/logo.imageset"
          os.makedirs(logo_dir, exist_ok=True)

          if os.path.exists("logo_app.png"):
              img = Image.open("logo_app.png").convert("RGBA")
              bg = Image.new("RGB", (1024, 1024), (13, 13, 26))
              resized = img.resize((900, 900), Image.LANCZOS)
              bg.paste(resized, (62, 62), resized)
              bg.save(f"{out_dir}/icon_1024.png", "PNG")
              print("App icon 1024x1024 saved")

          if os.path.exists("logo.png"):
              logo = Image.open("logo.png").convert("RGBA")
              logo.save(f"{logo_dir}/logo.png", "PNG")
              with open(f"{logo_dir}/Contents.json", "w") as f:
                  import json
                  json.dump({
                      "images": [{"idiom": "universal", "filename": "logo.png", "scale": "1x"}],
                      "info": {"author": "xcode", "version": 1}
                  }, f, indent=2)
              print("Splash logo saved")
          EOF

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (no signing)
        run: |
          xcodebuild \
            -project MyZoneApp.xcodeproj \
            -scheme MyZoneApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package IPA
        run: |
          APP=$(find ./build -name "*.app" -not -path "*simulator*" | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MyZoneApp.ipa Payload/
          ls -lh MyZoneApp.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyZone-iOS.ipa
          path: MyZoneApp.ipa
          retention-days: 30
