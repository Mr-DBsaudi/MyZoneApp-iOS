name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate app icons
        run: |
          pip install Pillow -q
          python - <<'EOF'
          from PIL import Image
          import os, json

          out_dir = "Resources/Assets.xcassets/AppIcon.appiconset"
          logo_dir = "Resources/Assets.xcassets/logo.imageset"
          os.makedirs(logo_dir, exist_ok=True)

          if os.path.exists("logo_app.png"):
              img = Image.open("logo_app.png").convert("RGBA")
              bg = Image.new("RGB", (1024, 1024), (13, 13, 26))
              resized = img.resize((900, 900), Image.LANCZOS)
              bg.paste(resized, (62, 62), resized)
              bg.save(f"{out_dir}/icon_1024.png", "PNG")
              print("App icon saved")

          if os.path.exists("logo.png"):
              logo = Image.open("logo.png").convert("RGBA")
              logo.save(f"{logo_dir}/logo.png", "PNG")
              with open(f"{logo_dir}/Contents.json", "w") as f:
                  json.dump({
                    "images": [
                      {"idiom": "universal", "scale": "1x", "filename": "logo.png"},
                      {"idiom": "universal", "scale": "2x"},
                      {"idiom": "universal", "scale": "3x"}
                    ],
                    "info": {"author": "xcode", "version": 1}
                  }, f, indent=2)
              print("Splash logo saved")
          EOF

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Generated project ==="
          ls -la MyZoneApp.xcodeproj/

      - name: Show available Xcode
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Build app
        id: build_step
        continue-on-error: true
        run: |
          xcodebuild \
            -project MyZoneApp.xcodeproj \
            -scheme MyZoneApp \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          BUILD_RESULT=${PIPESTATUS[0]}

          echo ""
          echo "====== BUILD ERRORS ======"
          grep -E "error:|BUILD FAILED|warning:" build.log | head -30 || true
          echo "=========================="

          exit $BUILD_RESULT

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 3

      - name: Package IPA
        if: steps.build_step.outcome == 'success'
        run: |
          APP=$(find . -name "*.app" -not -path "*simulator*" -not -path "*.xcarchive*" | head -1)
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MyZoneApp.ipa Payload/
          ls -lh MyZoneApp.ipa

      - name: Upload IPA
        if: steps.build_step.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: MyZone-iOS.ipa
          path: MyZoneApp.ipa
          retention-days: 30
